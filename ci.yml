# CI_REGISTRY_USER: tienolympia2020

stages:
  - build
  - docker
  - deploy

cache:
  paths:
    - .m2/repository

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  DOCKER_TLS_CERTDIR: ""


build-jar:
  stage: build
  image: maven:3.9.9-eclipse-temurin-21
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin
    - docker buildx create --use

  script:
    - |
      docker buildx build \
        --cache-from=type=registry,ref=$IMAGE_NAME:cache \
        --cache-to=type=registry,ref=$IMAGE_NAME:cache,mode=max \
        -t $IMAGE_NAME:latest \
        -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA \
        --push .


  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


deploy-prod:
  stage: deploy
  image: alpine:latest

  before_script:
    - apk add --no-cache openssh-client

    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa

    - ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

  script:
    - |
      scp docker-compose.yml $SERVER_USER@$SERVER_HOST:~/docker-compose.yml
      
      ssh $SERVER_USER@$SERVER_HOST << EOF
        cd ~
      
        docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin <<< "$CI_REGISTRY_PASSWORD"
      
        docker pull $CI_REGISTRY_IMAGE:latest

        docker compose down || true
        docker compose up -d
      EOF

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
